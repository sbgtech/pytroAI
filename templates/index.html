<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client/dist/socket.io.min.js"></script>
    <script src="/static/js/serial.js"></script>
    <title>Pytro AI</title>
  </head>
  <body>
    <div class="container-fluid">
      <!---------------------------------------- Welcome message ---------------------------------------->
      <div class="p-2 d-flex justify-content-between">
        <h1 class="fw-bold">PYTRO AI</h1>
        <img
          src="/static/images/Pytronix_Logo.png"
          alt="Pytronix Logo"
          width="100px"
          height="47px"
        />
      </div>
      <!---------------------------------------- Tab navigation ---------------------------------------->
      <ul class="nav nav-tabs w-100" id="mainTab" role="tablist">
        <li class="nav-item bg-primary" role="presentation">
          <a
            class="nav-link {% if request.endpoint == 'device' or request.endpoint == '' %}active{% endif %}"
            id="device-tab"
            href="{{ url_for('device') }}"
            role="tab"
            aria-controls="device"
            aria-selected="true"
            >Device</a
          >
        </li>
        <li class="nav-item bg-primary" role="presentation">
          <a
            class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}"
            id="settings-tab"
            href="{{ url_for('settings') }}"
            role="tab"
            aria-controls="settings"
            aria-selected="false"
            >Settings</a
          >
        </li>
        <li class="nav-item bg-primary" role="presentation">
          <a
            class="nav-link {% if request.endpoint == 'dfu' %}active{% endif %}"
            id="dfu-tab"
            href="{{ url_for('dfu') }}"
            role="tab"
            aria-controls="dfu"
            aria-selected="false"
            >DFU</a
          >
        </li>
        <li class="nav-item bg-primary" role="presentation">
          <a
            class="nav-link {% if request.endpoint == 'tcpftp' %}active{% endif %}"
            id="tcpftp-tab"
            href="{{ url_for('tcpftp') }}"
            role="tab"
            aria-controls="tcpftp"
            aria-selected="false"
            >TCP FTP</a
          >
        </li>
        <li class="nav-item bg-primary" role="presentation">
          <a
            class="nav-link {% if request.endpoint == 'build' %}active{% endif %}"
            id="build-tab"
            href="{{ url_for('build') }}"
            role="tab"
            aria-controls="build"
            aria-selected="false"
            >Build</a
          >
        </li>
      </ul>

      <!---------------------------------------- Tab content ---------------------------------------->
      <div class="tab-content w-100" id="myTabContent">
        {% block content %}
        <!-- This is where the content for each tab will go -->

        {% endblock %}
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
